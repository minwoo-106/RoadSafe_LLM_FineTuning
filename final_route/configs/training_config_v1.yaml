project: RoadSafe_AI
base_model: meta-llama/Llama-3.2-3B

hardware:
  gpu: RTX 3070
  vram_gb: 8
  environment: WSL Ubuntu + CUDA

qlora_default:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: fp16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  effective_batch_size: 16
  max_seq_length: 1024
  learning_rate: 0.0002
  num_train_epochs: 3
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  gradient_checkpointing: true
  fp16: true
  bf16: false

logging:
  report_to: tensorboard
  logging_steps: 5
  eval_steps: 50
  save_steps: 50
